<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Fond orange avec coins arrondis -->
  <rect width="512" height="512" rx="100" fill="#e44d0a"/>

  <!-- Structure principale (Bouclier et lignes du N) -->
  <g stroke="#ffffff" stroke-width="26" fill="none" stroke-linejoin="miter" stroke-linecap="butt" stroke-miterlimit="4">
    
    <!-- Contour du bouclier -->
    <path d="M 256 60 &#10;             L 416 110 &#10;             L 416 370 &#10;             L 256 450 &#10;             L 96 370 &#10;             L 96 110 Z"/>

    <!-- Partie gauche du "N" (Ligne verticale centrale, diagonale, et ligne verticale gauche) -->
    <path d="M 256 60 &#10;             L 256 245 &#10;             L 176 165 &#10;             L 176 360"/>

    <!-- Partie droite du "N" (Ligne verticale centrale, diagonale, et ligne verticale droite) -->
    <path d="M 256 450 &#10;             L 256 265 &#10;             L 336 345 &#10;             L 336 140"/>
  </g>

  <!-- Points de connexion (Noeuds) -->
  <g fill="#ffffff">
    <!-- Point en bas à gauche -->
    <circle cx="176" cy="360" r="22"/>
    
    <!-- Point en haut à droite -->
    <circle cx="336" cy="140" r="22"/>
  </g>
</svg>